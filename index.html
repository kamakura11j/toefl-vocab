<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL単語トレーナー</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --accent:#38bdf8;
    --ok:#34d399; --ng:#f87171; --text:#e2e8f0; --sub:#94a3b8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  header{width:100%; max-width:640px; padding:14px 18px 0; display:flex; justify-content:space-between; align-items:center;}
  h1{font-size:16px; margin:0; color:var(--accent); font-weight:700;}
  #stats{font-size:12px; color:var(--sub);}
  main{width:100%; max-width:640px; padding:16px; flex:1;}
  .card{background:var(--card); border-radius:18px; padding:28px 22px; box-shadow:0 8px 24px rgba(0,0,0,.35); cursor:pointer; user-select:none; min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; transition:transform .08s;}
  .card:active{transform:scale(.99);}
  .word-row{display:flex; align-items:center; gap:12px; margin-top:26px;}
  #word{font-size:34px; font-weight:800; letter-spacing:.5px; text-align:center;}
  .speak-btn{background:var(--card2); border:none; border-radius:50%; width:46px; height:46px; font-size:20px; cursor:pointer; color:var(--accent); flex:0 0 auto;}
  .speak-btn:active{background:#334760;}
  .hint{color:var(--sub); font-size:13px; margin-top:auto; padding-top:24px;}
  #example{margin-top:26px; font-size:18px; line-height:1.7; color:#cbd5e1; text-align:center; font-style:italic; display:none;}
  #choices{display:none; width:100%; margin-top:24px; flex-direction:column; gap:10px;}
  .choice{background:var(--card2); border:2px solid transparent; border-radius:12px; padding:14px 16px; font-size:16px; color:var(--text); cursor:pointer; text-align:left; width:100%;}
  .choice:not(.locked):hover{border-color:var(--accent);}
  .choice.correct{background:rgba(52,211,153,.18); border-color:var(--ok);}
  .choice.wrong{background:rgba(248,113,113,.18); border-color:var(--ng);}
  #result{display:none; margin-top:18px; font-size:20px; font-weight:700; text-align:center;}
  #result.ok{color:var(--ok);} #result.ng{color:var(--ng);}
  #answer-detail{display:none; margin-top:8px; color:var(--sub); font-size:14px; text-align:center;}
  #next-btn{display:none; margin-top:18px; background:var(--accent); color:#082f49; border:none; border-radius:12px; padding:13px 44px; font-size:16px; font-weight:700; cursor:pointer;}
  footer{width:100%; max-width:640px; padding:0 16px 20px; display:flex; gap:10px;}
  .ft-btn{flex:1; background:var(--card); border:1px solid #334155; color:var(--sub); border-radius:10px; padding:10px; font-size:13px; cursor:pointer;}
  #modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:10; justify-content:center; align-items:center; padding:20px;}
  #modal-box{background:var(--card); border-radius:16px; max-width:520px; width:100%; max-height:80vh; overflow-y:auto; padding:20px;}
  #modal-box h2{font-size:16px; margin:0 0 12px; color:var(--accent);}
  .weak-row{display:flex; justify-content:space-between; padding:8px 4px; border-bottom:1px solid #334155; font-size:14px;}
  .weak-row .m{color:var(--sub); margin-left:10px; flex:1; text-align:right;}
  .badge{color:var(--ng); font-weight:700; margin-left:10px;}
  #close-modal{margin-top:14px; width:100%; background:var(--card2); border:none; color:var(--text); border-radius:10px; padding:11px; cursor:pointer;}
</style>
</head>
<body>
<header>
  <h1>TOEFL単語トレーナー</h1>
  <div id="stats"></div>
</header>
<main>
  <div class="card" id="card">
    <div class="word-row">
      <div id="word"></div>
      <button class="speak-btn" id="speak" title="発音">🔊</button>
    </div>
    <div id="example"></div>
    <div id="choices"></div>
    <div id="result"></div>
    <div id="answer-detail"></div>
    <button id="next-btn">次へ →</button>
    <div class="hint" id="hint">タップして例文を表示</div>
  </div>
</main>
<footer>
  <button class="ft-btn" id="weak-btn">苦手単語リスト</button>
  <button class="ft-btn" id="reset-btn">学習記録をリセット</button>
</footer>
<div id="modal"><div id="modal-box">
  <h2>苦手単語(間違いが多い順)</h2>
  <div id="weak-list"></div>
  <button id="close-modal">閉じる</button>
</div></div>

<script>
// ---------- 学習記録 ----------
const KEY = "toefl_vocab_v1";
let store = {stats:{}, asked:0, correct:0};
try { const s = localStorage.getItem(KEY); if (s) store = JSON.parse(s); } catch(e) {}
function save(){ try { localStorage.setItem(KEY, JSON.stringify(store)); } catch(e) {} }
function st(w){ if(!store.stats[w]) store.stats[w] = {c:0, w:0}; return store.stats[w]; }

// ---------- 出題アルゴリズム(間違いが多いほど高頻度) ----------
function weight(word){
  const s = store.stats[word.w];
  if (!s) return 3;                      // 未出題はやや高め
  let v = 2 + s.w * 4 - s.c;             // 間違い1回で+4、正解1回で-1
  if (s.w > 0 && s.c === 0) v += 2;      // 一度も正解していない苦手語をさらに強化
  return Math.max(0.4, Math.min(v, 25));
}
let current = null, prevWord = null, phase = 0;
function pickWord(){
  const pool = WORDS.filter(x => x.w !== prevWord);
  let total = 0; const ws = pool.map(x => { const v = weight(x); total += v; return v; });
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++){ r -= ws[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}

// ---------- 4択の誤答生成(正解と紛らわしすぎる意味は除外) ----------
function core(m){ return m.replace(/[぀-ゟ、。()()\s・=~/!?!?]/g, ""); }
function similar(a, b){
  if (a === b) return true;
  const ca = core(a), cb = core(b);
  if (ca.length < 2 || cb.length < 2) return false;
  for (let i = 0; i <= ca.length - 2; i++){ if (cb.includes(ca.substr(i, 2))) return true; }
  return false;
}
function makeChoices(word){
  const distractors = [];
  const pool = WORDS.filter(x => x.w !== word.w).sort(() => Math.random() - 0.5);
  for (const x of pool){
    if (similar(x.m, word.m)) continue;
    if (distractors.some(d => similar(d, x.m))) continue;
    distractors.push(x.m);
    if (distractors.length === 3) break;
  }
  return [word.m, ...distractors].sort(() => Math.random() - 0.5);
}

// ---------- 発音 ----------
function speak(text){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.95;
    const v = speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e) {}
}

// ---------- 画面 ----------
const $ = id => document.getElementById(id);
function renderStats(){
  const rate = store.asked ? Math.round(store.correct / store.asked * 100) : 0;
  $("stats").textContent = `全${WORDS.length}語 | 出題${store.asked}回 | 正解率${rate}%`;
}
function show(word){
  current = word; phase = 0;
  $("word").textContent = word.w;
  $("example").style.display = "none";
  $("example").innerHTML = "";
  $("choices").style.display = "none";
  $("choices").innerHTML = "";
  $("result").style.display = "none";
  $("answer-detail").style.display = "none";
  $("next-btn").style.display = "none";
  $("hint").style.display = "block";
  $("hint").textContent = "タップして例文を表示";
  renderStats();
}
function showExample(){
  phase = 1;
  $("example").textContent = current.e;
  const b = document.createElement("button");
  b.className = "speak-btn"; b.style.cssText = "width:34px;height:34px;font-size:14px;margin-left:8px;vertical-align:middle;";
  b.textContent = "🔊";
  b.onclick = ev => { ev.stopPropagation(); speak(current.e); };
  $("example").appendChild(b);
  $("example").style.display = "block";
  $("hint").textContent = "タップして意味を4択から選ぶ";
}
function showChoices(){
  phase = 2;
  $("hint").style.display = "none";
  const box = $("choices");
  makeChoices(current).forEach(m => {
    const b = document.createElement("button");
    b.className = "choice"; b.textContent = m;
    b.onclick = ev => { ev.stopPropagation(); answer(b, m); };
    box.appendChild(b);
  });
  box.style.display = "flex";
}
function answer(btn, m){
  if (phase !== 2) return;
  phase = 3;
  const ok = (m === current.m);
  const s = st(current.w);
  store.asked++;
  if (ok){ s.c++; store.correct++; } else { s.w++; }
  save();
  document.querySelectorAll(".choice").forEach(c => {
    c.classList.add("locked"); c.onclick = null;
    if (c.textContent === current.m) c.classList.add("correct");
  });
  if (!ok) btn.classList.add("wrong");
  const r = $("result");
  r.textContent = ok ? "✅ 正解!" : "❌ 不正解…";
  r.className = ok ? "ok" : "ng";
  r.style.display = "block";
  $("answer-detail").textContent = `${current.w} = ${current.m}`;
  $("answer-detail").style.display = "block";
  $("next-btn").style.display = "inline-block";
  renderStats();
}
$("card").onclick = () => {
  if (phase === 0) showExample();
  else if (phase === 1) showChoices();
};
$("speak").onclick = ev => { ev.stopPropagation(); speak(current.w); };
$("next-btn").onclick = ev => { ev.stopPropagation(); prevWord = current.w; show(pickWord()); };

// ---------- 苦手リスト / リセット ----------
$("weak-btn").onclick = () => {
  const list = Object.entries(store.stats)
    .filter(([, s]) => s.w > 0)
    .sort((a, b) => b[1].w - a[1].w);
  const box = $("weak-list");
  box.innerHTML = list.length ? "" : "<p style='color:var(--sub);font-size:14px;'>まだ間違えた単語はありません。</p>";
  list.forEach(([w, s]) => {
    const word = WORDS.find(x => x.w === w); if (!word) return;
    const row = document.createElement("div");
    row.className = "weak-row";
    row.innerHTML = `<span>${w}</span><span class="m">${word.m}</span><span class="badge">×${s.w}</span>`;
    box.appendChild(row);
  });
  $("modal").style.display = "flex";
};
$("close-modal").onclick = () => $("modal").style.display = "none";
$("modal").onclick = ev => { if (ev.target === $("modal")) $("modal").style.display = "none"; };
$("reset-btn").onclick = () => {
  if (confirm("学習記録(正解・不正解の履歴)をすべてリセットしますか?")){
    store = {stats:{}, asked:0, correct:0}; save(); show(pickWord());
  }
};

// 音声リスト読み込み(初回対策)
if (typeof speechSynthesis !== "undefined") speechSynthesis.getVoices();
show(pickWord());
</script>
