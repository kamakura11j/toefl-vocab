<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL単語トレーナー</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --accent:#38bdf8;
    --ok:#34d399; --ng:#f87171; --text:#e2e8f0; --sub:#94a3b8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  header{width:100%; max-width:640px; padding:14px 18px 0; display:flex; justify-content:space-between; align-items:center;}
  h1{font-size:16px; margin:0; color:var(--accent); font-weight:700;}
  #stats{font-size:12px; color:var(--sub);}
  main{width:100%; max-width:640px; padding:16px; flex:1;}
  .card{background:var(--card); border-radius:18px; padding:28px 22px; box-shadow:0 8px 24px rgba(0,0,0,.35); cursor:pointer; user-select:none; min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; transition:transform .08s;}
  .card:active{transform:scale(.99);}
  .word-row{display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:22px; width:100%;}
  #word{font-size:34px; font-weight:800; letter-spacing:.3px; text-align:center; max-width:100%; overflow-wrap:anywhere; word-break:break-word; line-height:1.25;}
  .speak-btn{background:var(--card2); border:none; border-radius:50%; width:46px; height:46px; font-size:20px; cursor:pointer; color:var(--accent); flex:0 0 auto;}
  .speak-btn:active{background:#334760;}
  .hint{color:var(--sub); font-size:13px; margin-top:auto; padding-top:24px;}
  #example{margin-top:26px; font-size:18px; line-height:1.7; color:#cbd5e1; text-align:center; font-style:italic; display:none;}
  #choices{display:none; width:100%; margin-top:24px; flex-direction:column; gap:10px;}
  .choice{background:var(--card2); border:2px solid transparent; border-radius:12px; padding:14px 16px; font-size:16px; color:var(--text); cursor:pointer; text-align:left; width:100%;}
  .choice:not(.locked):hover{border-color:var(--accent);}
  .choice.correct{background:rgba(52,211,153,.18); border-color:var(--ok);}
  .choice.wrong{background:rgba(248,113,113,.18); border-color:var(--ng);}
  #result{font-size:17px; font-weight:700;}
  #result.ok{color:var(--ok);} #result.ng{color:var(--ng);}
  #answer-detail{display:none; margin-top:8px; color:var(--sub); font-size:14px; text-align:center;}
  #definition{display:none; margin-top:14px; font-size:15px; line-height:1.6; color:#a7c4e0; background:var(--card2); border-left:3px solid var(--accent); border-radius:8px; padding:10px 14px; text-align:left; width:100%;}
  #bottom-bar{display:none; position:fixed; left:0; right:0; bottom:0; z-index:5; justify-content:center; align-items:center; gap:16px; padding:10px 16px calc(10px + env(safe-area-inset-bottom)); background:rgba(15,23,42,.94); border-top:1px solid #334155;}
  #next-btn{background:var(--accent); color:#082f49; border:none; border-radius:12px; padding:12px 40px; font-size:16px; font-weight:700; cursor:pointer;}
  footer{width:100%; max-width:640px; padding:0 16px 20px; display:flex; gap:10px;}
  .ft-btn{flex:1; background:var(--card); border:1px solid #334155; color:var(--sub); border-radius:10px; padding:10px; font-size:13px; cursor:pointer;}
  #modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:10; justify-content:center; align-items:center; padding:20px;}
  #modal-box{background:var(--card); border-radius:16px; max-width:520px; width:100%; max-height:80vh; overflow-y:auto; padding:20px;}
  #modal-box h2{font-size:16px; margin:0 0 12px; color:var(--accent);}
  .weak-row{display:flex; justify-content:space-between; padding:8px 4px; border-bottom:1px solid #334155; font-size:14px;}
  .weak-row .m{color:var(--sub); margin-left:10px; flex:1; text-align:right;}
  .badge{color:var(--ng); font-weight:700; margin-left:10px;}
  .badge.flag{color:#fbbf24;}
  #flag-btn{background:var(--card2); border:none; border-radius:50%; width:46px; height:46px; font-size:22px; cursor:pointer; color:#fbbf24; flex:0 0 auto;}
  #flag-btn.on{background:rgba(251,191,36,.18);}
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{flex:1; background:var(--card2); border:none; color:var(--sub); border-radius:8px; padding:9px; font-size:13px; cursor:pointer;}
  .tab.active{background:var(--accent); color:#082f49; font-weight:700;}
  #mode-bar{display:none; width:100%; max-width:640px; padding:10px 16px 0; align-items:center; justify-content:space-between; gap:10px;}
  #mode-label{font-size:12px; color:#fbbf24; font-weight:700;}
  #mode-off{background:var(--card2); border:none; color:var(--text); border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer;}
  #flag-test-btn{display:none; width:100%; margin-bottom:12px; background:#fbbf24; color:#1e293b; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer;}
  .row-btn{background:transparent; border:1px solid #475569; color:var(--sub); border-radius:6px; padding:3px 9px; font-size:12px; cursor:pointer; margin-left:8px; flex:0 0 auto;}
  .row-btn:active{background:var(--card2);}
  #close-modal{margin-top:14px; width:100%; background:var(--card2); border:none; color:var(--text); border-radius:10px; padding:11px; cursor:pointer;}
</style>
</head>
<body>
<header>
  <h1>TOEFL単語トレーナー</h1>
  <div id="stats"></div>
</header>
<div id="mode-bar">
  <span id="mode-label">★ チェック単語のみ出題中</span>
  <button id="mode-off">全単語に戻す</button>
</div>
<main>
  <div class="card" id="card">
    <div class="word-row">
      <div id="word"></div>
      <button class="speak-btn" id="speak" title="発音">🔊</button>
      <button id="flag-btn" title="怪しい単語としてチェック">☆</button>
    </div>
    <div id="example"></div>
    <div id="definition"></div>
    <div id="choices"></div>
    <div id="answer-detail"></div>
    <div class="hint" id="hint">タップして例文を表示</div>
  </div>
</main>
<footer>
  <button class="ft-btn" id="list-btn">単語リスト</button>
  <button class="ft-btn" id="reset-btn">記録をリセット</button>
</footer>
<div id="bottom-bar"><span id="result"></span><button id="next-btn">次へ →</button></div>
<div id="modal"><div id="modal-box">
  <div class="tabs">
    <button class="tab active" id="tab-weak">苦手(間違えた)</button>
    <button class="tab" id="tab-flag">☆チェック済み</button>
  </div>
  <button id="flag-test-btn">★ この単語だけでテストする</button>
  <div id="weak-list"></div>
  <button id="close-modal">閉じる</button>
</div></div>

  if (!s) return 3;                      // 未出題はやや高め
  let v = 2 + s.w * 4 - s.c;             // 間違い1回で+4、正解1回で-1
  if (s.w > 0 && s.c === 0) v += 2;      // 一度も正解していない苦手語をさらに強化
  if (store.flags[word.w]) v += 3;       // ☆チェック単語も出やすく
  return Math.max(0.4, Math.min(v, 25));
}
let current = null, prevWord = null, phase = 0, mode = "all";
function activePool(){
  if (mode === "flag"){
    const p = WORDS.filter(x => store.flags[x.w]);
    if (p.length) return p;
    mode = "all";                       // ☆が0件になったら自動で全単語へ
  }
  return WORDS;
}
function pickWord(){
  const base = activePool();
  const pool = base.length > 1 ? base.filter(x => x.w !== prevWord) : base;
  let total = 0; const ws = pool.map(x => { const v = weight(x); total += v; return v; });
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++){ r -= ws[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}

// ---------- 4択の誤答生成(正解と紛らわしすぎる意味は除外) ----------
function core(m){ return m.replace(/[぀-ゟ、。()()\s・=~/!?!?]/g, ""); }
function similar(a, b){
  if (a === b) return true;
  const ca = core(a), cb = core(b);
  if (ca.length < 2 || cb.length < 2) return false;
  for (let i = 0; i <= ca.length - 2; i++){ if (cb.includes(ca.substr(i, 2))) return true; }
  return false;
}
function jcat(m){ // 意味の品詞っぽさを推定
  const t = m.replace(/((.*?))|\(.*?\)/g, "").split("、")[0].trim();
  if (/する$/.test(t)) return "vs";
  if (/[うくぐすつぬぶむ]$|[られめけせえ]る$/.test(t)) return "v";
  if (/[なのい]$|的$/.test(t)) return "adj";
  if (/に$/.test(t)) return "adv";
  return "n";
}
function spellSim(a, b){ // 綴りが紛らわしいか
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a.includes(b) || b.includes(a)) return true;
  let p = 0; while (p < a.length && p < b.length && a[p] === b[p]) p++;
  if (p >= 4) return true;
  let s = 0; while (s < a.length && s < b.length && a[a.length-1-s] === b[b.length-1-s]) s++;
  return s >= 5;
}
function makeChoices(word){
  const cat = jcat(word.m);
  const cands = WORDS
    .filter(x => x.w !== word.w && !similar(x.m, word.m))
    .map(x => ({x, s:(jcat(x.m) === cat ? 3 : 0) + (spellSim(x.w, word.w) ? 5 : 0) + Math.random() * 2.5}))
    .sort((a, b) => b.s - a.s);
  const distractors = [];
  for (const c of cands){
    if (distractors.some(d => similar(d, c.x.m))) continue;
    distractors.push(c.x.m);
    if (distractors.length === 3) break;
  }
  return [word.m, ...distractors].sort(() => Math.random() - 0.5);
}

// ---------- 発音 ----------
function speak(text){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.95;
    const v = speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e) {}
}

// ---------- 画面 ----------
const $ = id => document.getElementById(id);
function renderStats(){
  const rate = store.asked ? Math.round(store.correct / store.asked * 100) : 0;
  const n = Object.keys(store.flags).length;
  const scope = (mode === "flag") ? `★${n}語` : `全${WORDS.length}語`;
  $("stats").textContent = `${scope} | 出題${store.asked}回 | 正解率${rate}%`;
}
function show(word){
  current = word; phase = 0;
  $("word").textContent = word.w;
  $("example").style.display = "none";
  $("example").innerHTML = "";
  $("definition").style.display = "none";
  $("choices").style.display = "none";
  $("choices").innerHTML = "";
  $("answer-detail").style.display = "none";
  $("bottom-bar").style.display = "none";
  $("hint").style.display = "block";
  $("hint").textContent = "タップして例文を表示";
  const n = word.w.length;                       // 長い語は縮めて折り返す
  $("word").style.fontSize = n <= 11 ? "34px" : n <= 16 ? "28px" : n <= 22 ? "23px" : "19px";
  updateFlagBtn();
  updateModeBar();
  renderStats();
}
function updateModeBar(){
  $("mode-bar").style.display = (mode === "flag") ? "flex" : "none";
}
function updateFlagBtn(){
  const on = !!store.flags[current.w];
  $("flag-btn").textContent = on ? "★" : "☆";
  $("flag-btn").classList.toggle("on", on);
}
function showExample(){
  phase = 1;
  $("example").textContent = current.e;
  const b = document.createElement("button");
  b.className = "speak-btn"; b.style.cssText = "width:34px;height:34px;font-size:14px;margin-left:8px;vertical-align:middle;";
  b.textContent = "🔊";
  b.onclick = ev => { ev.stopPropagation(); speak(current.e); };
  $("example").appendChild(b);
  $("example").style.display = "block";
  $("definition").textContent = "📖 " + current.d;
  $("definition").style.display = "block";
  $("hint").textContent = "タップして意味を4択から選ぶ";
}
function showChoices(){
  phase = 2;
  $("hint").style.display = "none";
  const box = $("choices");
  makeChoices(current).forEach(m => {
    const b = document.createElement("button");
    b.className = "choice"; b.textContent = m;
    b.onclick = ev => { ev.stopPropagation(); answer(b, m); };
    box.appendChild(b);
  });
  box.style.display = "flex";
}
function answer(btn, m){
  if (phase !== 2) return;
  phase = 3;
  const ok = (m === current.m);
  const s = st(current.w);
  store.asked++;
  if (ok){ s.c++; store.correct++; } else { s.w++; }
  save();
  document.querySelectorAll(".choice").forEach(c => {
    c.classList.add("locked"); c.onclick = null;
    if (c.textContent === current.m) c.classList.add("correct");
  });
  if (!ok) btn.classList.add("wrong");
  const r = $("result");
  r.textContent = ok ? "✅ 正解!" : "❌ 不正解…";
  r.className = ok ? "ok" : "ng";
  $("answer-detail").textContent = `${current.w} = ${current.m}`;
  $("answer-detail").style.display = "block";
  $("bottom-bar").style.display = "flex";
  renderStats();
}
$("card").onclick = () => {
  if (phase === 0) showExample();
  else if (phase === 1) showChoices();
};
$("speak").onclick = ev => { ev.stopPropagation(); speak(current.w); };
$("flag-btn").onclick = ev => {
  ev.stopPropagation();
  if (store.flags[current.w]) delete store.flags[current.w];
  else store.flags[current.w] = true;
  save(); updateFlagBtn();
};
$("next-btn").onclick = ev => { ev.stopPropagation(); prevWord = current.w; show(pickWord()); };

// ---------- 単語リスト(苦手 / ☆チェック) ----------
function renderWeak(){
  const list = Object.entries(store.stats).filter(([, s]) => s.w > 0).sort((a, b) => b[1].w - a[1].w);
  const box = $("weak-list");
  box.innerHTML = list.length ? "" : "<p style='color:var(--sub);font-size:14px;'>まだ間違えた単語はありません。</p>";
  list.forEach(([w, s]) => {
    const word = WORDS.find(x => x.w === w); if (!word) return;
    const row = document.createElement("div");
    row.className = "weak-row";
    row.innerHTML = `<span>${w}</span><span class="m">${word.m}</span><span class="badge">×${s.w}</span>`;
    box.appendChild(row);
  });
}
function renderFlag(){
  const list = Object.keys(store.flags).filter(w => store.flags[w]);
  const box = $("weak-list");
  $("flag-test-btn").style.display = list.length ? "block" : "none";
  box.innerHTML = list.length ? "" : "<p style='color:var(--sub);font-size:14px;'>☆でチェックした単語はまだありません。カードの☆を押すと登録されます。</p>";
  list.forEach(w => {
    const word = WORDS.find(x => x.w === w); if (!word) return;
    const row = document.createElement("div");
    row.className = "weak-row";
    const label = document.createElement("span"); label.textContent = w;
    const mean = document.createElement("span"); mean.className = "m"; mean.textContent = word.m;
    const btn = document.createElement("button");
    btn.className = "row-btn"; btn.textContent = "★解除";
    btn.onclick = () => {
      delete store.flags[w]; save();
      renderFlag();
      if (current && current.w === w) updateFlagBtn();
      if (mode === "flag" && !Object.keys(store.flags).length){ mode = "all"; updateModeBar(); }
      renderStats();
    };
    row.append(label, mean, btn);
    box.appendChild(row);
  });
}
$("list-btn").onclick = () => { setTab("weak"); $("modal").style.display = "flex"; };
function setTab(which){
  $("tab-weak").classList.toggle("active", which === "weak");
  $("tab-flag").classList.toggle("active", which === "flag");
  if (which === "weak"){ $("flag-test-btn").style.display = "none"; renderWeak(); }
  else renderFlag();
}
$("tab-weak").onclick = () => setTab("weak");
$("tab-flag").onclick = () => setTab("flag");
$("flag-test-btn").onclick = () => {
  mode = "flag";
  $("modal").style.display = "none";
  prevWord = null;
  show(pickWord());
};
$("mode-off").onclick = () => { mode = "all"; prevWord = null; show(pickWord()); };
$("close-modal").onclick = () => $("modal").style.display = "none";
$("modal").onclick = ev => { if (ev.target === $("modal")) $("modal").style.display = "none"; };
$("reset-btn").onclick = () => {
  if (confirm("学習記録(正解・不正解の履歴)をリセットしますか?\n※☆チェックした単語は残ります。")){
    store = {stats:{}, asked:0, correct:0, flags:store.flags}; save(); show(pickWord());
  }
};

// 音声リスト読み込み(初回対策)
if (typeof speechSynthesis !== "undefined") speechSynthesis.getVoices();
show(pickWord());
</script>
